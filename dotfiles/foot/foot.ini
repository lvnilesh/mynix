[main]
term=xterm-256color
font=SF Mono:size=14
pad=12x12
dpi-aware=no

[cursor]
style=beam
blink=yes

[colors-dark]
alpha=0.97
foreground=e0e0e0
background=1e1e1e
cursor=e8e8e8 535353

# macOS-inspired dark palette
regular0=1e1e1e  # black
regular1=ff6b6b  # red
regular2=69db7c  # green
regular3=ffd93d  # yellow
regular4=6cb6ff  # blue
regular5=d2a8ff  # magenta
regular6=76e4f7  # cyan
regular7=e0e0e0  # white

bright0=535353   # bright black
bright1=ff8a8a   # bright red
bright2=8eeaa0   # bright green
bright3=ffe566   # bright yellow
bright4=8fc8ff   # bright blue
bright5=e2c5ff   # bright magenta
bright6=a0edfa   # bright cyan
bright7=f5f5f5   # bright white

[csd]
preferred=server
