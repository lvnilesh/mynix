# Hyprlock — themed lock screen
# Theme colors loaded from theme-switch generated file
source = ~/.config/hypr/hyprlock-theme.conf

background {
    color = $lock_bg
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 0.9
    brightness = 0.6
}

input-field {
    size = 600, 80
    halign = center
    valign = center
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = $lock_accent
    inner_color = $lock_bg
    font_color = $lock_fg
    check_color = $lock_accent
    fail_color = $lock_error
    fade_on_empty = false
    rounding = 12
    font_family = SF Pro Display
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    shadow_passes = 0
}

# Time
label {
    text = cmd[update:1000] echo "$(date +%H:%M)"
    color = $lock_fg
    font_size = 72
    font_family = SF Pro Display
    halign = center
    valign = center
    position = 0, 160
    shadow_passes = 0
}

# Date
label {
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"
    color = $lock_accent
    font_size = 18
    font_family = SF Pro Display
    halign = center
    valign = center
    position = 0, 100
    shadow_passes = 0
}
