autogenerated = 0
# Hyprland configuration — omarchy-inspired UX
# https://wiki.hyprland.org/Configuring/

# Theme colors (managed by theme-switch script)
source = ~/.config/hypr/theme.conf

######################
### NVIDIA / VIDEO ###
######################

env = LIBVA_DRIVER_NAME,iHD
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = WLR_RENDERER,vulkan
env = WLR_RENDERER_ALLOW_SOFTWARE,1
env = WLR_NO_HARDWARE_CURSORS,1
env = GBM_BACKEND,nvidia-drm
env = WLR_DRM_DEVICES,/dev/dri/card1

##########################
### SESSION / TOOLKIT  ###
##########################

env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = MOZ_ENABLE_WAYLAND,1
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

env = QT_QPA_PLATFORM,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORMTHEME,kvantum

env = GTK_THEME,Nordic-darker
env = GDK_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

################
### MONITORS ###
################

# Dell center, ASUS flush right, Kamvas below-left (inverted), RTK right of Kamvas
monitor=DP-4,6144x2560@120,0x0,1
monitor=HDMI-A-3,2560x1440@60,6144x0,1
monitor=DP-3,1920x1080@60,0x2560,1,transform,2
monitor=HDMI-A-2,1680x1050@59.88,1920x2560,1
monitor=,preferred,auto,1

# Default workspace → monitor mapping
workspace = 1, monitor:DP-4, default:true        # Dell U5226KW (ultrawide)
workspace = 2, monitor:HDMI-A-3, default:true     # ASUS PA27JCV
workspace = 3, monitor:DP-3, default:true          # HAT Kamvas 13
workspace = 4, monitor:HDMI-A-2, default:true      # RTK PM1561P

###################
### MY PROGRAMS ###
###################

$terminal = kitty --config /home/cloudgenius/mynix/dotfiles/kitty/kitty.conf
$fileManager = nautilus
$menu = wofi --show drun --config /home/cloudgenius/mynix/dotfiles/wofi/config --style /home/cloudgenius/mynix/dotfiles/wofi/style.css

#################
### AUTOSTART ###
#################

$reload_waybar = systemctl --user restart waybar.service

# Theme + wallpaper (restores last selected theme on login)
exec-once = /home/cloudgenius/mynix/scripts/theme-switch $(cat ~/.config/current-theme 2>/dev/null || echo nord)

# Clipboard history daemon
exec-once = wl-paste --watch cliphist store

# Idle management (auto-lock + DPMS)
exec-once = hypridle

# SwayOSD server managed by systemd user service (home/waybar.nix)
# Auto-restarts on crash via Restart=on-failure

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0

    col.active_border = $theme_active_border
    col.inactive_border = $theme_inactive_border

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12            # sharp corners (omarchy style)

    # Subtle transparency: focused windows nearly opaque, unfocused slightly dimmed
    active_opacity = 0.97
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 10
        passes = 3
        special = true
        brightness = 0.60
        contrast = 0.75
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 4, easeOutQuint, slide  # instant workspace switch (omarchy)
    animation = specialWorkspace, 1, 4, easeOutQuint, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2         # always split right (omarchy)
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true    # raise windows that request attention (omarchy)
    # Reduce input latency: process mouse events as soon as they arrive
    # rather than batching with the next render frame
    mouse_move_enables_dpms = true
    vfr = true                  # variable frame rate — render only when needed, saves GPU for inference
    vrr = 1                     # adaptive sync (VRR) if monitor supports it — reduces tearing and latency
}

cursor {
    no_hardware_cursors = true
    hide_on_key_press = true    # auto-hide while typing (omarchy)
    warp_on_change_workspace = 1
    inactive_timeout = 30
    # Allow cursor to cross monitor boundaries without sticking at edges.
    # With 4 monitors at different scales, default behavior creates dead zones.
    no_warps = false
}

ecosystem {
    no_donation_nag = true
}

# Chrome: disable opacity and blur to prevent video flicker
windowrule {
    name = chrome-no-effects
    match:class = google-chrome
    opacity = 1.0 override 1.0 override
    no_blur = on
    no_shadow = on
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_rules =

    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1

    # Flat profile disables acceleration curves so pointer movement is
    # 1:1 with hand movement (essential for muscle memory).
    accel_profile = flat
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# Per-device overrides
device {
    name = razer-razer-viper-v3-pro-se-mouse
    accel_profile = flat
    sensitivity = 0
}

# Logitech MX Master 3S (via Bolt USB receiver)
# DPI 3200 set in Solaar config; sensitivity 0 = no software scaling.
device {
    name = logitech-usb-receiver-mouse
    accel_profile = flat
    sensitivity = 0
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, W, killactive,
bind = $mainMod, M, layoutmsg, swapwithmaster
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit
# Theme switcher
bind = $mainMod, T, exec, /home/cloudgenius/mynix/scripts/theme-switch

bind = $mainMod, C, exec, google-chrome-stable --restore-last-session
bind = $mainMod SHIFT, C, exec, google-chrome-stable --incognito

# Wallpaper cycling
bind = $mainMod SHIFT, W, exec, /home/cloudgenius/mynix/scripts/wallpaper-next

# System menu
bind = $mainMod, SPACE, exec, /home/cloudgenius/mynix/scripts/system-menu

# Walker launcher (if available, fallback to wofi)
bind = $mainMod, A, exec, walker 2>/dev/null || wofi --show drun --config /home/cloudgenius/mynix/dotfiles/wofi/config --style /home/cloudgenius/mynix/dotfiles/wofi/style.css

# Gaps toggle
bind = $mainMod, G, exec, /home/cloudgenius/mynix/scripts/gaps-toggle

# Window opacity toggle
bind = $mainMod, O, exec, hyprctl setprop active opaque toggle

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Clipboard history
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu --prompt "Clipboard" --config /home/cloudgenius/mynix/dotfiles/wofi/config --style /home/cloudgenius/mynix/dotfiles/wofi/style.css | cliphist decode | wl-copy

# Screen recording toggle
bind = $mainMod SHIFT, R, exec, /home/cloudgenius/mynix/scripts/screen-record-toggle

# Window float + pin (pop out)
bind = $mainMod, F, togglefloating,
bind = $mainMod, F, pin,

# Layout toggle (dwindle <-> master)
bind = $mainMod SHIFT, L, exec, /home/cloudgenius/mynix/scripts/layout-toggle

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace (Super+Alt+N instead of Super+Shift+N
# because MX Keys Mini Mac layout sends Super+Shift+4 for Screen Capture)
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, 4, movetoworkspace, 4
bind = $mainMod ALT, 5, movetoworkspace, 5
bind = $mainMod ALT, 6, movetoworkspace, 6
bind = $mainMod ALT, 7, movetoworkspace, 7
bind = $mainMod ALT, 8, movetoworkspace, 8
bind = $mainMod ALT, 9, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, bracketleft, workspace, e-1
bind = $mainMod, bracketright, workspace, e+1

# Cross-monitor
bind = $mainMod SHIFT, bracketright, movetoworkspace, m+1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, m-1

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Logitech MX Master 3S — thumb/gesture button (mouse:277)
# Clipboard history: shows everything copied with Ctrl+C. Pick an item to re-copy it.
# Same as Super+Shift+V but one-handed on the mouse.
bind = , mouse:277, exec, cliphist list | wofi --dmenu --prompt "Clipboard" --config /home/cloudgenius/mynix/dotfiles/wofi/config --style /home/cloudgenius/mynix/dotfiles/wofi/style.css | cliphist decode | wl-copy

# Logitech MX Keys Mini — media key bindings (multiplatform: MacOS layout)
# Verified via libinput debug-events 2026-04-03. All Solaar divert-keys = Regular.
#
# Media mode (default, no Fn needed):
#   F1-F3  = Host selector (firmware, not bindable)
#   F4-F5  = KB backlight (firmware, not bindable)
#   F6     = Dictation — NO HID event in Regular mode (dead on Wayland)
#   F7     = Emoji — sends Super+Ctrl+Space (Mac emoji shortcut)
#   F8     = Screen Capture — sends Super+Shift+4 (Mac screenshot shortcut)
#   F9     = Mic Mute — NO HID event in Regular mode (dead on Wayland)
#   F10    = Play/Pause — KEY_PLAYPAUSE (164)
#   F11    = Mute Sound — KEY_MUTE (113)
#   F12    = Volume Down — KEY_VOLUMEDOWN (114)
#   ins    = Volume Up — KEY_VOLUMEUP (115)
#
# Fn-lock mode (Fn+Esc toggle) sends plain F1-F12 keysyms.

# --- Media mode: XF86 keysyms ---
bindl = ,XF86AudioPlay, exec, playerctl play-pause                          # F10 = Play/Pause
bindl = ,XF86AudioPause, exec, playerctl play-pause                         # F10 = Play/Pause (alt)
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle   # F11 = Speaker Mute
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower  # F12 = Volume Down
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise  # ins = Volume Up
# Note: XF86AudioMicMute (F9) sends no HID event in MacOS layout — mic mute is dead on Wayland.
# Keeping the binding in case an external keyboard sends it.
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle   # Mic Mute (external KB only)

# --- Media mode: Mac firmware combos (MX Keys Mini in MacOS layout) ---
bind = SUPER CTRL, Space, exec, bemoji -t                                   # F7 = Emoji picker (types selection)
bind = SUPER SHIFT, 4, exec, hyprshot -m region --freeze --clipboard-only   # F8 = Screenshot region → clipboard

# --- Fn-lock mode: plain F-key bindings ---
bindel = , F1, exec, ddcutil setvcp 10 - 10 --bus 17                       # Brightness Down (DELL U5226KW)
bindel = , F2, exec, ddcutil setvcp 10 + 10 --bus 17                       # Brightness Up (DELL U5226KW)
bind = , F8, exec, hyprshot -m region --freeze --clipboard-only             # Screenshot
bindel = , F9, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle                 # Mic Mute
bindl = , F10, exec, playerctl play-pause                                   # Play/Pause
bindel = , F11, exec, swayosd-client --output-volume mute-toggle            # Speaker Mute
bindel = , F12, exec, swayosd-client --output-volume lower                  # Volume Down

# Keybinds cheatsheet
bind = $mainMod, slash, exec, /home/cloudgenius/mynix/scripts/keybinds-cheatsheet

##############################
### WINDOWS AND WORKSPACES ###
##############################

